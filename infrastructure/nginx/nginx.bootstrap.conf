events {
  worker_connections 1024;
}

http {
  server {
    listen 80;
    listen [::]:80;
    server_name api.trackflow.uz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 200 'TrackFlow API - awaiting SSL setup';
      add_header Content-Type text/plain;
    }
  }
}
