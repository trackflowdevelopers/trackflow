services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: trackflow_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: trackflow
      POSTGRES_PASSWORD: trackflow_secret
      POSTGRES_DB: trackflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-timescale.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trackflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: trackflow_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  emqx:
    image: emqx/emqx:5.4.0
    container_name: trackflow_emqx
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8883:8883"
      - "18083:18083"
    environment:
      EMQX_NAME: trackflow_broker
      EMQX_HOST: 0.0.0.0
    volumes:
      - emqx_data:/opt/emqx/data
      - emqx_log:/opt/emqx/log

  backend:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
      target: development
    container_name: trackflow_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: trackflow
      DB_PASSWORD: trackflow_secret
      DB_NAME: trackflow
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_URL: mqtt://emqx:1883
      JWT_SECRET: change_this_in_production_please
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change_this_refresh_in_production
      JWT_REFRESH_EXPIRES_IN: 30d
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      emqx:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: trackflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  emqx_data:
  emqx_log:
